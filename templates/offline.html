<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - 视频中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #e94560;
        }
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .status-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-item:last-child { border-bottom: none; }
        .status-label { color: #666; font-size: 14px; }
        .status-value { font-weight: 600; }
        .status-value.online { color: #10b981; }
        .status-value.offline { color: #ef4444; }
        .btn-retry {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }
        .tips {
            margin-top: 30px;
            padding: 20px;
            background: rgba(59,130,246,0.1);
            border-radius: 12px;
            border-left: 3px solid #3b82f6;
        }
        .tips h3 {
            color: #3b82f6;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .tips ul {
            text-align: left;
            color: #888;
            font-size: 14px;
            line-height: 1.8;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>离线状态</h1>
        <p>当前无法连接到服务器，请检查网络连接</p>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">网络状态</span>
                <span class="status-value offline" id="networkStatus">❌ 离线</span>
            </div>
            <div class="status-item">
                <span class="status-label">缓存模式</span>
                <span class="status-value" id="cacheStatus">📦 只读</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后同步</span>
                <span class="status-value" id="lastSync">未知</span>
            </div>
        </div>
        
        <button class="btn-retry" onclick="location.reload()">🔄 重试连接</button>
        
        <div class="tips">
            <h3>💡 提示</h3>
            <ul>
                <li>已缓存的页面仍可浏览</li>
                <li>视频播放需要网络连接</li>
                <li>检查 Wi-Fi 或移动数据</li>
                <li>点击重试按钮重新连接</li>
            </ul>
        </div>
    </div>
    
    <script>
        // 更新网络状态
        function updateStatus() {
            const statusEl = document.getElementById('networkStatus');
            if (navigator.onLine) {
                statusEl.textContent = '✅ 在线';
                statusEl.className = 'status-value online';
                setTimeout(() => location.reload(), 1000);
            } else {
                statusEl.textContent = '❌ 离线';
                statusEl.className = 'status-value offline';
            }
        }
        
        // 监听网络变化
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // 检查最后同步时间
        const lastSync = localStorage.getItem('lastSync');
        if (lastSync) {
            document.getElementById('lastSync').textContent = new Date(lastSync).toLocaleString('zh-CN');
        }
        
        // 初始检查
        updateStatus();
        
        // 自动重试（每 5 秒）
        let retryCount = 0;
        const retryInterval = setInterval(() => {
            retryCount++;
            if (navigator.onLine) {
                clearInterval(retryInterval);
                location.reload();
            }
            if (retryCount >= 12) { // 1 分钟后停止
                clearInterval(retryInterval);
            }
        }, 5000);
    </script>
</body>
</html>
